<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Elizabeth</title>
    <style>
        :root {
            --bg-color: #0f0c1b;
            --ball-color: #1a1630;
            --accent-color: #ff3366;
            --text-color: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(255, 51, 102, 0.3);
        }
        .subtitle {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-bottom: 30px;
            text-align: center;
            padding: 0 20px;
        }
        .container {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .magic-ball {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle at 30% 30%, #2c2554, var(--ball-color) 70%, #05040a);
            border-radius: 50%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 5px 15px rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: transform 0.1s ease;
        }
        .window {
            width: 160px;
            height: 160px;
            background: #080612;
            border-radius: 50%;
            border: 4px solid #120e24;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
        }
        .display-text {
            font-size: 1rem;
            text-align: center;
            font-weight: 600;
            line-height: 1.4;
            color: #4da6ff;
            text-shadow: 0 0 8px rgba(77, 166, 255, 0.6);
            transition: opacity 0.3s ease, transform 0.5s ease;
        }
        .status {
            margin-top: 30px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00ffcc;
            height: 20px;
            font-weight: bold;
        }
        .shaking {
            animation: shake 0.1s infinite alternate;
        }
        @keyframes shake {
            0% { transform: translate(4px, 4px) rotate(1deg); }
            100% { transform: translate(-4px, -4px) rotate(-1deg); }
        }
        button {
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <h1>Ask Elizabeth</h1>
    <div class="subtitle" id="instruction">Move your mouse wildly here or shake your phone to activate her judgment.</div>

    <div class="container">
        <div class="magic-ball" id="ball">
            <div class="window">
                <div class="display-text" id="response-window">E.8</div>
            </div>
        </div>
    </div>

    <div class="status" id="status-bar">IDLE</div>
    <button id="perm-btn">Enable Motion (iOS)</button>

<script>
    const responseMatrix = {
        Sarcastic: [
            "Sure, if you consider a miracle to be a valid strategy.",
            "Reply hazy, try asking me after I've had my coffee.",
            "Signs point to yes, strictly to spite your enemies.",
            "Don't count on it. Just like you counting on finding your keys.",
            "Ask again later when I care a little bit more.",
            "Yes, absolutely. In an alternate reality, that is.",
            "The stars say yes, but my common sense says absolutely not.",
            "Outlook looks great, if you completely lower your standards."
        ],
        Witty: [
            "Yes, and I'll even pretend it was your idea all along.",
            "My sources say no, and by sources, I mean your track record.",
            "Concentrate and ask again when you aren't being ridiculous.",
            "Error 404: Valid answer not found for this level of logic.",
            "The odds are entirely in your favor, assuming the math is wrong.",
            "I’d give you an answer, but we both know you won't listen anyway.",
            "Signs point to yes, but proceed with your usual lack of caution.",
            "My response depends entirely on whether you are paying for dinner."
        ],
        Brutal: [
            "Very doubtful. Honestly, I'm embarrassed for you for even asking.",
            "Better not tell you now. I don't want to deal with your crying face.",
            "Outlook bleak, even the universe is shaking its head at this point.",
            "No. Absolute hard pass. Go back to sleep.",
            "Signs point to no, but at least you are consistent at failing.",
            "Absolutely not. Don't ever ask me that again.",
            "Yes, if your goal is spectacular, unmitigated disaster.",
            "No, and deep down in your soul, you already knew that was the answer."
        ]
    };


        const styles = ["Sarcastic", "Witty", "Brutal"];
        let isMoving = false;
        let motionTimeout = null;
        let motionDuration = 0;
        let intervalTimer = null;
        let selectedStyle = "";
        let finalAnswer = "";

        const ball = document.getElementById('ball');
        const displayText = document.getElementById('response-window');
        const statusBar = document.getElementById('status-bar');
        const permBtn = document.getElementById('perm-btn');

        function processMotionStep() {
            motionDuration += 100;
            if (motionDuration < 1500) {
                selectedStyle = styles[Math.floor(Math.random() * styles.length)];
                statusBar.innerText = `Choosing Vibe: ${selectedStyle.toUpperCase()}`;
                displayText.style.color = "#ff3366";
                displayText.innerText = selectedStyle;
            } else {
                const answers = responseMatrix[selectedStyle];
                finalAnswer = answers[Math.floor(Math.random() * answers.length)];
                statusBar.innerText = `Channelling Elizabeth...`;
                displayText.style.color = "#4da6ff";
                displayText.innerText = "...";
            }
        }

        function startMotionDetection() {
            if (!isMoving) {
                isMoving = true;
                ball.classList.add('shaking');
                displayText.style.opacity = "0.5";
                motionDuration = 0;
                intervalTimer = setInterval(processMotionStep, 100);
            }
            clearTimeout(motionTimeout);
            motionTimeout = setTimeout(() => { stopMotionDetection(); }, 600);
        }

        function stopMotionDetection() {
            if (!isMoving) return;
            isMoving = false;
            ball.classList.remove('shaking');
            clearInterval(intervalTimer);
            displayText.style.opacity = "1";

            if (motionDuration < 1500) {
                statusBar.innerText = "EFFORT BLEAK";
                displayText.innerText = "Keep shaking longer, lazy.";
                displayText.style.color = "#ffcc00";
            } else {
                statusBar.innerText = `DECISION LOCKED (${selectedStyle})`;
                displayText.innerText = finalAnswer;
            }
        }

        window.addEventListener('mousemove', (e) => {
            if (Math.abs(e.movementX) > 5 || Math.abs(e.movementY) > 5) {
                startMotionDetection();
            }
        });

        let lastX = null, lastY = null, lastZ = null;
        function handleMotion(event) {
            let acceleration = event.accelerationIncludingGravity;
            if (!acceleration.x) return;
            let deltaX = Math.abs(lastX - acceleration.x);
            let deltaY = Math.abs(lastY - acceleration.y);
            let deltaZ = Math.abs(lastZ - acceleration.z);

            if ((deltaX > 12 && deltaY > 12) || (deltaX > 12 && deltaZ > 12) || (deltaY > 12 && deltaZ > 12)) {
                startMotionDetection();
            }
            lastX = acceleration.x; lastY = acceleration.y; lastZ = acceleration.z;
        }

        if (window.DeviceMotionEvent && typeof DeviceMotionEvent.requestPermission === 'function') {
            permBtn.style.display = "block";
            document.getElementById('instruction').innerText = "Click below to enable mobile tilt.";
            permBtn.addEventListener('click', () => {
                DeviceMotionEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        window.addEventListener('devicemotion', handleMotion);
                        permBtn.style.display = "none";
                        document.getElementById('instruction').innerText = "Shake your phone.";
                    }
                });
            });
        } else {
            window.addEventListener('devicemotion', handleMotion);
        }
    </script>
</body>
</html>
